<!DOCTYPE html>
<!--
  renderer/curation.html — Detached Curation Panel Window
  =========================================================
  Role in VAI architecture:
    UI for the optional detached curation window (spec Section 11).
    Opens in a separate BrowserWindow (480×900) when the CVA clicks
    "Detach to second monitor" — designed for dual-monitor setups.

    Single scrollable column layout (no panels, no sidebar):
      1. Case context card (read-only)
      2. Protocol flags (P&A, Identity Declaration)
      3. Response mode selector
      4. Preferred response editor (generous height, primary editing space)
      5. Confidence + Split chips
      6. CVA notes textarea
      7. Action buttons (Write Pair, Write Additional Pair, Skip, Flag)

    All file I/O is handled by the main process. Write actions fire IPC
    messages (curation:pair-written, curation:skip, curation:flag) which
    main.js handles and then broadcasts case-advance back to main window.

  Populated in: Step 13 (detached curation window)
  Logic:        renderer/curation.js
-->
